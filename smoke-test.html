<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TEN26 Smoke Test</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            background: #050518;
            color: #f7f4ff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            display: grid;
            grid-template-rows: auto 1fr;
        }
        header {
            padding: 14px 18px;
            border-bottom: 1px solid rgba(255,255,255,0.12);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
        }
        h1 {
            font-size: 15px;
            margin: 0;
            letter-spacing: 0;
        }
        #status {
            font-size: 13px;
            color: #ffd4f5;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: 0;
            background: #02006c;
        }
    </style>
</head>
<body>
    <header>
        <h1>TEN26 Smoke Test</h1>
        <div id="status">Starting...</div>
    </header>
    <iframe id="app-frame" title="TEN26 app smoke test"></iframe>
    <script>
        const statusNode = document.getElementById('status');
        const frame = document.getElementById('app-frame');
        const failures = [];
        const legacyStartupPresetNames = ['ram1', 'ram3', 'ram22', 'Ram4', 'ram0', 'ram00', 'ram5', 'ram7', 'ram S', 'ram O', 'ram X', 'eraser', 'ram'];

        try {
            localStorage.setItem('ten26.savedCustomPresets.v3.startupBundle', JSON.stringify({
                app: 'TEN26',
                version: 'ten26-layer-presets-v1',
                storageMode: 'layer-preset-list',
                presets: legacyStartupPresetNames.map(name => ({
                    name,
                    state: {
                        activeLayerKey: 'layer-1',
                        layerOrder: ['layer-1'],
                        dotLayers: {
                            'layer-1': {
                                cols: '4',
                                rows: '2',
                                spacing: '22'
                            }
                        }
                    }
                }))
            }));
        } catch (error) {
            failures.push(`Preset storage setup failed: ${error.message}`);
        }

        frame.src = 'index.html';

        window.addEventListener('error', event => {
            failures.push(event.message || 'Unhandled error');
        });
        window.addEventListener('unhandledrejection', event => {
            failures.push(event.reason?.message || String(event.reason || 'Unhandled promise rejection'));
        });

        function pass(message) {
            statusNode.textContent = message;
            statusNode.style.color = '#d4ffde';
        }

        function fail(message) {
            statusNode.textContent = message;
            statusNode.style.color = '#ffd4f5';
        }

        frame.addEventListener('load', () => {
            setTimeout(() => {
                try {
                    const doc = frame.contentDocument;
                    const win = frame.contentWindow;
                    const required = [
                        '#canvas-viewport',
                        '#morph-canvas',
                        '#control-panel',
                        '#preset-select',
                        '#settings-select',
                        '#svg-slide-layer',
                        '#special-svg-layer'
                    ];
                    const missing = required.filter(selector => !doc.querySelector(selector));
                    if (missing.length) {
                        fail(`Missing nodes: ${missing.join(', ')}`);
                        return;
                    }
                    const nestedGroups = [
                        ['#drawer-upload-media', ['#drawer-slides', '#drawer-image-slides', '#drawer-special-overlays', '#drawer-masks']],
                        ['#drawer-advanced-options', ['#drawer-grid', '#drawer-flicker', '#drawer-blink-mode']]
                    ];
                    const brokenGroup = nestedGroups.find(([parentSelector, childSelectors]) => {
                        const parent = doc.querySelector(parentSelector);
                        return !parent || childSelectors.some(childSelector => !parent.querySelector(childSelector));
                    });
                    if (brokenGroup) {
                        fail(`Nested drawer group failed: ${brokenGroup[0]}`);
                        return;
                    }
                    const labelChecks = [
                        ['#drawer-trigger-view-options', 'View Options'],
                        ['#drawer-trigger-masks', 'Grid Masking'],
                        ['#drawer-trigger-upload-media', 'Upload Media'],
                        ['#drawer-trigger-special-overlays', 'Special Overlays'],
                        ['#drawer-trigger-timing', 'Timing'],
                        ['#drawer-trigger-advanced-options', 'Advanced Options'],
                        ['#drawer-trigger-save-settings', 'Save Settings']
                    ];
                    const brokenLabel = labelChecks.find(([selector, expected]) => {
                        const node = doc.querySelector(selector);
                        return !node || node.textContent.trim() !== expected;
                    });
                    if (brokenLabel) {
                        fail(`Drawer label mismatch: ${brokenLabel[0]}`);
                        return;
                    }
                    if (doc.querySelector('#drawer-slide-grid-advanced')) {
                        fail('Old Grid advanced drawer still exists.');
                        return;
                    }
                    if (doc.querySelector('#slide-grid-attract-time, #grid-attract-return-pull, #transition-flicker-time, #transition-hold-time, #transition-flicker-delay, #transition-grid-time, #transition-return-force-speed, #transition-current-force-speed, #transition-travel-force-speed, #transition-overall-pace')) {
                        fail('Removed timing controls still exist.');
                        return;
                    }
                    const newTransitionControls = [
                        ['#transition-current-time', '0.1', '8'],
                        ['#transition-current-flicker-start', '0', null],
                        ['#transition-next-time', '0.1', '12'],
                        ['#transition-next-flicker-start', '0', null],
                        ['#transition-return-grid-time', '0', '8']
                    ];
                    const missingTransitionControl = newTransitionControls.find(([selector, expectedMin, expectedMax]) => {
                        const node = doc.querySelector(selector);
                        return !node ||
                            node.min !== expectedMin ||
                            (expectedMax !== null && node.max !== expectedMax) ||
                            !Number.isFinite(parseFloat(node.value));
                    });
                    if (missingTransitionControl) {
                        fail(`Transition control missing or malformed: ${missingTransitionControl[0]}`);
                        return;
                    }
                    const mouseControls = [
                        '#drawer-mouse-interaction',
                        '#mouse-interaction-enabled',
                        '#mouse-repel-strength',
                        '#mouse-svg-target-count',
                        '#mouse-interaction-radius',
                        '#mouse-interaction-softness',
                        '#mouse-scroll-step'
                    ];
                    const missingMouseControl = mouseControls.find(selector => !doc.querySelector(selector));
                    const legacyMouseLock = doc.querySelector('[data-mouse-scroll-control], .mouse-scroll-link-btn');
                    const mouseRepelNode = doc.querySelector('#mouse-repel-strength');
                    const mouseTargetNode = doc.querySelector('#mouse-svg-target-count');
                    const mouseRadiusNode = doc.querySelector('#mouse-interaction-radius');
                    const mouseSoftnessNode = doc.querySelector('#mouse-interaction-softness');
                    const mouseStepNode = doc.querySelector('#mouse-scroll-step');
                    const removedAttractNode = doc.querySelector('#mouse-attract-strength');
                    const mouseDefaultsReady =
                        mouseRepelNode?.min === '10' &&
                        mouseRepelNode?.value === '300' &&
                        mouseTargetNode?.value === '400' &&
                        mouseRadiusNode?.min === '100' &&
                        mouseRadiusNode?.value === '520' &&
                        mouseSoftnessNode?.value === '3' &&
                        mouseStepNode?.value === '20';
                    const mouseRuntimeReady = typeof win.getMouseInteractionFrameState === 'function' &&
                        typeof win.getMouseInteractionControlState === 'function' &&
                        typeof win.prepareMouseSvgTargetTargets === 'function' &&
                        typeof win.cycleMouseInteractionMode !== 'function';
                    const keyboardShortcutFocusReady = typeof win.isTypingTarget === 'function' &&
                        !win.isTypingTarget(mouseRepelNode) &&
                        win.isTypingTarget(doc.querySelector('#bg-static-hex')) &&
                        win.isTypingTarget(doc.querySelector('#preset-select'));
                    const mouseTargetPrepReady = typeof win.prepareMouseSvgTargetTargets === 'function' &&
                        win.prepareMouseSvgTargetTargets() > 0;
                    if (missingMouseControl || legacyMouseLock || removedAttractNode || !mouseDefaultsReady || !mouseRuntimeReady || !keyboardShortcutFocusReady || !mouseTargetPrepReady) {
                        fail(`Mouse interaction missing or malformed: ${missingMouseControl || (legacyMouseLock ? 'legacy locks' : (removedAttractNode ? 'attract control' : (!mouseDefaultsReady ? 'defaults' : (!mouseRuntimeReady ? 'runtime' : (!keyboardShortcutFocusReady ? 'keyboard focus' : 'target prep')))))}`);
                        return;
                    }
                    const mouseToggle = doc.querySelector('#mouse-interaction-enabled');
                    const mouseRect = doc.querySelector('#canvas-viewport')?.getBoundingClientRect();
                    const mousePoint = mouseRect ? {
                        clientX: mouseRect.left + mouseRect.width * 0.5,
                        clientY: mouseRect.top + mouseRect.height * 0.5
                    } : null;
                    const dispatchMouse = (type, button, buttons) => {
                        doc.querySelector('#canvas-viewport')?.dispatchEvent(new win.MouseEvent(type, {
                            bubbles: true,
                            cancelable: true,
                            button,
                            buttons,
                            clientX: mousePoint?.clientX || 0,
                            clientY: mousePoint?.clientY || 0
                        }));
                    };
                    if (mouseToggle) {
                        mouseToggle.checked = true;
                        mouseToggle.dispatchEvent(new win.Event('change', { bubbles: true }));
                    }
                    dispatchMouse('mousemove', 0, 0);
                    dispatchMouse('mousedown', 0, 1);
                    const leftState = win.getMouseInteractionFrameState(win.performance.now());
                    dispatchMouse('mousedown', 2, 3);
                    const rightOverLeftState = win.getMouseInteractionFrameState(win.performance.now());
                    dispatchMouse('mouseup', 2, 1);
                    const leftAfterRightReleaseState = win.getMouseInteractionFrameState(win.performance.now());
                    dispatchMouse('mouseup', 0, 0);
                    dispatchMouse('mousedown', 2, 2);
                    const rightState = win.getMouseInteractionFrameState(win.performance.now());
                    dispatchMouse('mousedown', 0, 3);
                    const leftOverRightState = win.getMouseInteractionFrameState(win.performance.now());
                    dispatchMouse('mouseup', 0, 2);
                    const rightAfterLeftReleaseState = win.getMouseInteractionFrameState(win.performance.now());
                    dispatchMouse('mouseup', 2, 0);
                    if (mouseToggle) {
                        mouseToggle.checked = false;
                        mouseToggle.dispatchEvent(new win.Event('change', { bubbles: true }));
                    }
                    const mouseButtonPriorityReady =
                        leftState?.svgTargetActive === true &&
                        leftState?.strength === 0 &&
                        rightOverLeftState?.mode === 'repel' &&
                        rightOverLeftState?.strength > 0 &&
                        leftAfterRightReleaseState?.svgTargetActive === true &&
                        rightState?.mode === 'repel' &&
                        leftOverRightState?.svgTargetActive === true &&
                        rightAfterLeftReleaseState?.mode === 'repel';
                    if (!mouseButtonPriorityReady) {
                        fail('Mouse button overlap behavior did not resolve correctly.');
                        return;
                    }
                    const maskState = typeof win.getMaskState === 'function' ? win.getMaskState('svg') : null;
                    const imageMaskState = typeof win.getMaskState === 'function' ? win.getMaskState('image') : null;
                    if (!maskState?.enabled || !imageMaskState?.enabled) {
                        fail('Mask warmup is not enabled.');
                        return;
                    }
                    if (typeof win.applySpecialOverlayState !== 'function' || typeof win.getSvgState !== 'function') {
                        fail('Special overlay runtime functions are missing.');
                        return;
                    }
                    win.applySpecialOverlayState([
                        {
                            name: 'special-a.svg',
                            svg: '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20"><rect width="20" height="20" fill="white"/></svg>',
                            assignedSlides: [0],
                            enabled: true
                        },
                        {
                            name: 'special-b.svg',
                            svg: '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20"><circle cx="10" cy="10" r="8" fill="white"/></svg>',
                            assignedSlides: [0, 1],
                            enabled: true
                        }
                    ]);
                    const specialRows = doc.querySelectorAll('#special-overlay-list .special-overlay-row');
                    const firstRowFirstSlide = specialRows[0]?.querySelector('.special-slide-check');
                    const secondRowFirstSlide = specialRows[1]?.querySelector('.special-slide-check');
                    const secondRowSecondSlide = specialRows[1]?.querySelectorAll('.special-slide-check')[1];
                    const svgStateWithSpecial = win.getSvgState();
                    const specialAssignmentReady = specialRows.length === 2 &&
                        firstRowFirstSlide?.getAttribute('aria-checked') === 'true' &&
                        secondRowFirstSlide?.disabled === true &&
                        secondRowSecondSlide?.getAttribute('aria-checked') === 'true' &&
                        svgStateWithSpecial.specialOverlays?.length === 2 &&
                        svgStateWithSpecial.specialOverlays[0]?.assignedSlides?.includes(0) &&
                        svgStateWithSpecial.specialOverlays[1]?.assignedSlides?.includes(1);
                    if (!specialAssignmentReady) {
                        fail('Special overlay assignment UI did not initialize.');
                        return;
                    }
                    if (typeof win.getSpecialTransitionPlan !== 'function') {
                        fail('Special transition planner is missing.');
                        return;
                    }
                    const sameSpecialClassPlan = win.getSpecialTransitionPlan(0, 1);
                    const outgoingSpecialPlan = win.getSpecialTransitionPlan(1, 2);
                    const incomingSpecialPlan = win.getSpecialTransitionPlan(2, 1);
                    if (
                        sameSpecialClassPlan.currentTarget ||
                        sameSpecialClassPlan.nextTarget ||
                        !outgoingSpecialPlan.currentTarget ||
                        outgoingSpecialPlan.nextTarget ||
                        incomingSpecialPlan.currentTarget ||
                        !incomingSpecialPlan.nextTarget
                    ) {
                        fail('Special transition exception did not resolve correctly.');
                        return;
                    }
                    const canvas = doc.querySelector('#morph-canvas');
                    const presetOptions = Array.from(doc.querySelector('#preset-select')?.options || []);
                    const presetCount = presetOptions.length;
                    const presetNames = presetOptions.map(option => (option.textContent || '').replace(/^!\s*/, ''));
                    const startupPresetNames = ['Orbit Confetti-4', 'Pink Spiral Swarm-3', 'Bubble Veil-3', 'Pink Bloom-2', 'Soft Orbit-2', 'Chaos Orbit-2', 'Clean Orbit-2', 'Stacked Orbit-4', 'Soft Comet-1', 'Blue Bloom-1', 'Jitter Shards-1', 'Eraser Storm-7', 'Nebula Scatter-2'];
                    const hasOnlyStartupPresets = presetNames.length === startupPresetNames.length &&
                        startupPresetNames.every((name, index) => presetNames[index] === name) &&
                        legacyStartupPresetNames.every(name => !presetNames.includes(name));
                    const motionLayerCount = doc.querySelectorAll('#motion-matrix-panel .motion-layer-drawer').length;
                    const gridLayerCount = doc.querySelectorAll('#drawer-grid .grid-layer-content').length;
                    const hasRuntime = typeof win.renderFrame === 'function' || !!canvas.getContext('2d');
                    const compactPresetState = typeof win.createLayerPresetState === 'function'
                        ? win.createLayerPresetState({
                            activeLayerKey: 'layer-1',
                            layerOrder: ['layer-1'],
                            svgMediaStackIndex: 1,
                            mouse: { enabled: true, repelStrength: '240' },
                            autoTransition: { currentTime: '8' },
                            bg: { mode: 'cycle3' },
                            slides: [{ type: 'svg', name: 'sample.svg', svg: '<svg></svg>' }],
                            imageLayer: { src: 'data:image/png;base64,AAA', name: 'sample.png', scale: '75', offsetX: '1', offsetY: '2' },
                            dotLayers: {
                                'layer-1': {
                                    cols: '11',
                                    rows: '3',
                                    spacing: '42',
                                    visibilityOn: '0.25'
                                }
                            },
                            randomRanges: {
                                'dot-layer-1-pull': { randomMin: '0.2', randomMax: '0.9' },
                                'blink-visibility-on': { randomMin: '0.1', randomMax: '2' }
                            },
                            randomLocks: ['dot-layer-1-pull', 'blink-visibility-on']
                        })
                        : null;
                    const compactExportReady = !!compactPresetState &&
                        compactPresetState.presetType === 'layers' &&
                        !compactPresetState.slides &&
                        !compactPresetState.imageLayer &&
                        !compactPresetState.mouse &&
                        !compactPresetState.autoTransition &&
                        compactPresetState.dotLayers?.['layer-1']?.cols === '11' &&
                        compactPresetState.dotLayers?.['layer-1']?.visibilityOn === undefined &&
                        !!compactPresetState.randomRanges?.['dot-layer-1-pull'] &&
                        !compactPresetState.randomRanges?.['blink-visibility-on'] &&
                        compactPresetState.randomLocks?.includes('dot-layer-1-pull') &&
                        !compactPresetState.randomLocks?.includes('blink-visibility-on');
                    const compactSettingsState = typeof win.createSettingsState === 'function'
                        ? win.createSettingsState({
                            activeLayerKey: 'layer-1',
                            layerOrder: ['layer-1'],
                            svgMediaStackIndex: 1,
                            mouse: { enabled: true, repelStrength: '240' },
                            autoTransition: { currentTime: '8' },
                            blink: { visibilityOn: '2.5' },
                            bg: { mode: 'cycle3' },
                            slides: [{ type: 'svg', name: 'sample.svg', svg: '<svg></svg>' }],
                            specialOverlays: [{ name: 'special.svg', svg: '<svg></svg>', assignedSlides: [0], enabled: true }],
                            imageLayer: { src: 'data:image/png;base64,AAA', name: 'sample.png', scale: '75', offsetX: '1', offsetY: '2' },
                            view: { scale: '75', scaleMode: 'manual', frameRate: '30', overlayOpacity: '0' },
                            dotLayers: {
                                'layer-1': {
                                    cols: '11',
                                    rows: '3',
                                    spacing: '42'
                                }
                            },
                            randomRanges: {
                                'dot-layer-1-pull': { randomMin: '0.2', randomMax: '0.9' }
                            },
                            randomLocks: ['dot-layer-1-pull']
                        })
                        : null;
                    const compactSettingsReady = !!compactSettingsState &&
                        compactSettingsState.settingsType === 'non-layer-settings' &&
                        compactSettingsState.mouse?.repelStrength === '240' &&
                        compactSettingsState.autoTransition?.currentTime === '8' &&
                        compactSettingsState.slides?.length === 1 &&
                        compactSettingsState.specialOverlays?.length === 1 &&
                        compactSettingsState.view?.frameRate === '30' &&
                        !compactSettingsState.activeLayerKey &&
                        !compactSettingsState.layerOrder &&
                        !compactSettingsState.svgMediaStackIndex &&
                        !compactSettingsState.dotLayers &&
                        !compactSettingsState.randomRanges &&
                        !compactSettingsState.randomLocks;
                    const mouseRepelControl = doc.querySelector('#mouse-repel-strength');
                    const blinkOnControl = doc.querySelector('#blink-visibility-on');
                    const timingCurrentControl = doc.querySelector('#transition-current-time');
                    if (mouseRepelControl) mouseRepelControl.value = '211';
                    if (blinkOnControl) blinkOnControl.value = '4.25';
                    if (timingCurrentControl) timingCurrentControl.value = '6.75';
                    if (typeof win.applyLayerPresetState === 'function') {
                        win.applyLayerPresetState({
                            activeLayerKey: 'layer-1',
                            layerOrder: ['layer-1'],
                            dotLayers: {
                                'layer-1': {
                                    cols: '12',
                                    rows: '4',
                                    spacing: '36',
                                    pull: '0.9'
                                }
                            },
                            randomRanges: {
                                'dot-layer-1-pull': { randomMin: '0.2', randomMax: '0.9' },
                                'blink-visibility-on': { randomMin: '0.1', randomMax: '2' }
                            },
                            randomLocks: ['dot-layer-1-pull', 'blink-visibility-on']
                        });
                    }
                    const layerApplyKeepsConfig = typeof win.applyLayerPresetState === 'function' &&
                        mouseRepelControl?.value === '211' &&
                        blinkOnControl?.value === '4.25' &&
                        timingCurrentControl?.value === '6.75';
                    const gridColsControl = doc.querySelector('#grid-layer-1-cols');
                    if (gridColsControl) gridColsControl.value = '17';
                    if (typeof win.applySettingsState === 'function') {
                        win.applySettingsState({
                            autoTransition: { currentTime: '5.5' },
                            mouse: { repelStrength: '99' },
                            blink: { visibilityOn: '2.5' },
                            view: { scale: '75', scaleMode: 'manual', frameRate: '30', overlayOpacity: '0' }
                        });
                    }
                    const settingsApplyKeepsLayer = typeof win.applySettingsState === 'function' &&
                        gridColsControl?.value === '17' &&
                        mouseRepelControl?.value === '99' &&
                        blinkOnControl?.value === '2.5' &&
                        timingCurrentControl?.value === '5.5';
                    const sanitizer = win.TEN26SanitizeSvgText;
                    const unsafeSvg = '<svg onload="alert(1)" xmlns="http://www.w3.org/2000/svg"><scr' + 'ipt>alert(1)</scr' + 'ipt><rect width="10" height="10" /></svg>';
                    const sanitized = typeof sanitizer === 'function' ? sanitizer(unsafeSvg) : '';
                    const hardeningReady = !!win.__TEN26_HARDENING_INSTALLED__ &&
                        typeof sanitizer === 'function' &&
                        !/onload|<script/i.test(sanitized);
                    if (failures.length) {
                        fail(`Runtime errors: ${failures.slice(0, 2).join(' | ')}`);
                        return;
                    }
                    if (!hardeningReady) {
                        fail('Hardening layer did not initialize.');
                        return;
                    }
                    if (!compactExportReady) {
                        fail('Layer-only preset serialization did not initialize.');
                        return;
                    }
                    if (!compactSettingsReady) {
                        fail('Settings-only serialization did not initialize.');
                        return;
                    }
                    if (!layerApplyKeepsConfig) {
                        fail('Layer preset apply changed mouse, blink, or timing config.');
                        return;
                    }
                    if (!settingsApplyKeepsLayer) {
                        fail('Settings apply changed layer values or missed non-layer controls.');
                        return;
                    }
                    if (!hasRuntime || !hasOnlyStartupPresets || presetNames.includes('Space Mod') || motionLayerCount < 9 || gridLayerCount < 9) {
                        fail(`Runtime did not initialize fully; presets ${presetNames.join(', ')}, motion layers ${motionLayerCount}, grid layers ${gridLayerCount}.`);
                        return;
                    }
                    pass(`Passed: hardening active with ${presetCount} preset option${presetCount === 1 ? '' : 's'} and ${motionLayerCount} dynamic layers.`);
                } catch (error) {
                    fail(`Smoke test failed: ${error.message}`);
                }
            }, 3000);
        });
    </script>
</body>
</html>
